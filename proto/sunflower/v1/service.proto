syntax = "proto3";

package sunflower.v1;

import "google/protobuf/struct.proto";
import "sunflower/v1/models.proto";

message GenerateRequestContext {
  string platform = 1;
  string platform_sid = 2;
  Meta meta = 3;
  Message message = 4;
  string scene = 5;
  map<string, google.protobuf.Value> args = 6;
}

message GenerateRequest {
  oneof payload {
    GenerateRequestContext context = 1;
    bool cancel = 2;
  }
}

message GenerateResponse {
  oneof status {
    string queue = 1;
    string start = 2;
    MessagePart part = 3;
    string end = 4;
    string error = 5;
  }
}

message UpdateUserRequest {
  string platform = 1;
  string id = 2;
  optional int32 score = 3;
}

message UpdateUserResponse {
  string platform = 1;
  string id = 2;
  int32 score = 3;
}

message ClearChatRequest {
  string platform = 1;
  string platform_sid = 2;
  optional string scene = 3;
}

message ClearChatResponse {}

service SunflowerService {
  rpc Generate(stream GenerateRequest) returns (stream GenerateResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc ClearChat(ClearChatRequest) returns (ClearChatResponse);
}
